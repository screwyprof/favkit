[package]
name = "favkit"
version = "0.1.0"
edition = "2021"
description = "A tool to manage macOS Finder sidebar items"
authors = ["Maksim Shcherbo <max@happygopher.nl>"]
license = "MIT"

[lib]
path = "src/lib.rs"

[[bin]]
name = "favkit"
path = "src/main.rs"

[dependencies]
core-foundation = "0.10.0"
core-services = "1.0.0"
clap = { version = "4.4.11", features = ["derive"] }
anyhow = "1.0"
thiserror = "2.0.3"
dirs = "5.0.1"
