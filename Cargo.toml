[package]
name = "favkit"
version = "0.1.0"
edition = "2021"
description = "A tool to manage macOS Finder sidebar items"
authors = ["Maksim Shcherbo <max@happygopher.nl>"]
license = "MIT"

[lib]
path = "src/lib.rs"

[[bin]]
name = "favkit"
path = "src/main.rs"

[dependencies]
core-foundation = "0.10.0"
core-services = "1.0.0"
clap = { version = "4.5.22", features = ["derive"] }
anyhow = "1.0.94"
thiserror = "2.0.4"
dirs = "5.0.1"
log = "0.4"

[features]
test-utils = [] # Enable test utilities for external crates

[dev-dependencies]
favkit = { path = ".", features = ["test-utils"] }
coverage-helper = "0.2"
cargo-llvm-cov = "0.6.14"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(coverage,coverage_nightly)',
] }
